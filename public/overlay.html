<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Giveaway Wheel Overlay</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden;font-family:Inter,system-ui,Arial,sans-serif}
.overlay{
  width:760px;height:390px;border-radius:28px;padding:18px 22px;color:white;
  background:radial-gradient(circle at 20% 0%,rgba(192,132,252,.42),transparent 34%),linear-gradient(135deg,rgba(34,12,69,.99),rgba(12,5,26,.99));
  border:2px solid rgba(255,255,255,.18);
  box-shadow:0 22px 70px rgba(0,0,0,.55),inset 0 0 45px rgba(139,92,246,.22);
  position:relative;display:grid;grid-template-columns:300px 1fr;align-items:center;gap:26px
}
.info{padding:14px 4px 14px 12px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;min-width:0}
.title{font-size:38px;font-weight:1000;letter-spacing:-.045em;line-height:.92;text-transform:uppercase;text-shadow:0 0 18px rgba(192,132,252,.7)}
.keywordLine{display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);font-size:16px;font-weight:900;color:#f5f3ff;white-space:nowrap}
.keyword{color:#fff;background:linear-gradient(135deg,#8b5cf6,#c084fc);padding:5px 10px;border-radius:999px;font-size:19px;font-weight:1000;box-shadow:0 0 18px rgba(139,92,246,.45);max-width:145px;overflow:hidden;text-overflow:ellipsis}
.count{margin-top:13px;color:#d9ccff;font-size:15px;font-weight:900}.hidden{display:none}
.wheelBox{width:340px;height:340px;position:relative;display:grid;place-items:center;justify-self:center}
.pointer{position:absolute;top:0;left:50%;transform:translateX(-50%);z-index:8;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid #fff;filter:drop-shadow(0 0 10px rgba(255,255,255,.7))}
.wheel{width:310px;height:310px;border-radius:50%;border:8px solid rgba(255,255,255,.93);box-shadow:0 0 0 7px rgba(139,92,246,.38),0 0 55px rgba(139,92,246,.55);transition:transform 5s cubic-bezier(.08,.85,.12,1);position:relative;overflow:hidden;background:#8b5cf6}
.wheelLabels{position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:3}
.sliceLabel{position:absolute;left:50%;top:20px;width:96px;margin-left:-48px;text-align:center;font-size:10px;font-weight:1000;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.65);transform-origin:48px 126px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wheel:after{content:"";position:absolute;inset:72px;border-radius:50%;background:linear-gradient(180deg,#2b1050,#140628);border:4px solid rgba(255,255,255,.78);box-shadow:inset 0 0 25px rgba(0,0,0,.65);z-index:4}
.centerText{position:absolute;width:164px;height:164px;border-radius:50%;display:grid;place-items:center;text-align:center;z-index:7;padding:16px;pointer-events:none}
.centerText .small{color:#d8b4fe;font-weight:1000;font-size:12px;text-transform:uppercase;letter-spacing:.06em}
.centerText .winner{font-size:25px;font-weight:1000;line-height:1.04;word-break:break-word;text-shadow:0 0 20px rgba(192,132,252,.75)}
.centerText .idle{font-size:21px;font-weight:1000;line-height:1.05}
.newEntry{animation:newEntry .45s ease-out}
@keyframes newEntry{0%{transform:scale(.96);filter:brightness(1.8)}100%{transform:scale(1);filter:brightness(1)}}
@keyframes pulseWin{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}.winPulse{animation:pulseWin .7s ease-in-out infinite}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="info">
    <div class="title">Giveaway<br>Wheel</div>
    <div class="keywordLine">Type <span class="keyword" id="keyword">!join</span> in chat</div>
    <div class="count" id="count">0 entries</div>
  </div>
  <div class="wheelBox">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
    <div class="centerText">
      <div>
        <div class="small" id="centerSmall">Type keyword to enter</div>
        <div class="idle" id="centerMain">Waiting...</div>
      </div>
    </div>
  </div>
</div>
<script>
const socket=io();
let state={participants:[]};
let wheelRot=0;

function fitName(n,len=14){
  return String(n||"Unknown").slice(0,len);
}

function makeConic(participants){
  const list=(participants&&participants.length)?participants:["Waiting"];
  const n=Math.min(list.length,40);
  const colors=["#7c3aed","#ffffff","#a855f7","#ede9fe","#6d28d9","#ffffff","#8b5cf6","#ddd6fe"];
  const step=360/n;
  let stops=[];
  for(let i=0;i<n;i++){
    const start=(i*step).toFixed(4);
    const end=((i+1)*step).toFixed(4);
    stops.push(`${colors[i%colors.length]} ${start}deg ${end}deg`);
  }
  return `conic-gradient(from -90deg, ${stops.join(",")})`;
}

function drawWheel(participants){
  const list=(participants&&participants.length)?participants:["Waiting"];
  const n=Math.min(list.length,40);
  const step=360/n;
  wheel.innerHTML="";
  wheel.style.background=makeConic(list);

  const labels=document.createElement("div");
  labels.className="wheelLabels";

  for(let i=0;i<n;i++){
    const label=document.createElement("div");
    label.className="sliceLabel";
    label.style.transform=`rotate(${i*step+step/2}deg)`;
    label.textContent=fitName(list[i],12);
    labels.appendChild(label);
  }

  wheel.appendChild(labels);
}

function render(s){
  state=s;
  keyword.textContent=s.keyword||"!join";

  if(s.hideCount){
    count.classList.add("hidden");
  }else{
    count.classList.remove("hidden");
    count.textContent=(s.count||0)+" entr"+((s.count||0)===1?"y":"ies");
  }

  drawWheel(s.participants||[]);

  if(!s.rolling&&s.lastWinner){
    centerSmall.textContent="Winner";
    centerMain.textContent=fitName(s.lastWinner,18);
    centerMain.className="winner winPulse";
  }else if(!s.rolling){
    centerSmall.textContent="Type keyword to enter";
    centerMain.textContent=(s.count||0)>0?"Ready":"Waiting...";
    centerMain.className="idle";
  }
}

socket.on("state",render);

socket.on("entry-added",data=>{
  render(data.state);
  overlay.classList.remove("newEntry");
  void overlay.offsetWidth;
  overlay.classList.add("newEntry");
  centerSmall.textContent=fitName(data.username,16)+" entered";
  centerMain.textContent=(data.state.count||0)+" entries";
  centerMain.className="idle";
});

socket.on("reset-wheel",render);

socket.on("roll-start",data=>{
  centerSmall.textContent="Rolling";
  centerMain.textContent="Good luck";
  centerMain.className="idle";

  if(!data.hideCount){
    count.classList.remove("hidden");
    count.textContent=data.count+" entries";
  }else{
    count.classList.add("hidden");
  }

  keyword.textContent=data.keyword||"!join";
  drawWheel(data.participants||data.names||[]);

  wheel.style.transition="none";
  wheel.style.transform="rotate("+wheelRot+"deg)";

  setTimeout(()=>{
    wheelRot+=1800+Math.floor(Math.random()*360);
    wheel.style.transition="transform 5s cubic-bezier(.08,.85,.12,1)";
    wheel.style.transform="rotate("+wheelRot+"deg)";
  },40);
});

socket.on("roll-finish",data=>{
  centerSmall.textContent="Winner";
  centerMain.textContent=fitName(data.winner,18);
  centerMain.className="winner winPulse";
  drawWheel(data.participants||state.participants||[]);
});

async function poll(){
  try{
    const s=await fetch("/api/state").then(r=>r.json());
    render(s);
  }catch(e){}
}
poll();
setInterval(poll,2500);
</script>
</body>
</html>
