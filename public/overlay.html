<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Giveaway Wheel Overlay</title>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:transparent;overflow:hidden;font-family:Inter,system-ui,Arial,sans-serif}
.overlay{width:430px;min-height:580px;border-radius:30px;padding:17px;color:white;background:radial-gradient(circle at 50% 0%,rgba(192,132,252,.42),transparent 34%),linear-gradient(180deg,rgba(34,12,69,.99),rgba(12,5,26,.99));border:2px solid rgba(255,255,255,.18);box-shadow:0 22px 70px rgba(0,0,0,.55),inset 0 0 45px rgba(139,92,246,.22);position:relative}
.header{text-align:center;padding:5px 8px 9px}.title{font-size:29px;font-weight:1000;letter-spacing:-.04em;line-height:.95;text-transform:uppercase;text-shadow:0 0 18px rgba(192,132,252,.7)}
.keyword{display:inline-flex;margin-top:9px;padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);font-weight:1000;font-size:20px}
.count{margin-top:8px;color:#d9ccff;font-size:14px;font-weight:900}.hidden{display:none}
.wheelBox{width:354px;height:354px;margin:6px auto 0;position:relative;display:grid;place-items:center}
.pointer{position:absolute;top:-2px;left:50%;transform:translateX(-50%);z-index:8;width:0;height:0;border-left:17px solid transparent;border-right:17px solid transparent;border-top:34px solid #fff;filter:drop-shadow(0 0 10px rgba(255,255,255,.7))}
.wheel{width:325px;height:325px;border-radius:50%;border:8px solid rgba(255,255,255,.93);box-shadow:0 0 0 7px rgba(139,92,246,.38),0 0 55px rgba(139,92,246,.55);transition:transform 5s cubic-bezier(.08,.85,.12,1);position:relative;overflow:hidden;background:#8b5cf6}
.slice{position:absolute;inset:0;transform-origin:50% 50%;clip-path:polygon(50% 50%,50% 0,100% 0,100% 30%);background:var(--c);display:block}
.sliceLabel{position:absolute;left:50%;top:22px;width:110px;margin-left:-55px;text-align:center;font-size:12px;font-weight:1000;color:var(--tc);text-shadow:0 1px 2px rgba(0,0,0,.4);transform-origin:55px 140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wheel:after{content:"";position:absolute;inset:76px;border-radius:50%;background:linear-gradient(180deg,#2b1050,#140628);border:4px solid rgba(255,255,255,.78);box-shadow:inset 0 0 25px rgba(0,0,0,.65);z-index:4}
.centerText{position:absolute;width:172px;height:172px;border-radius:50%;display:grid;place-items:center;text-align:center;z-index:7;padding:18px;pointer-events:none}
.centerText .small{color:#d8b4fe;font-weight:1000;font-size:13px;text-transform:uppercase;letter-spacing:.06em}.centerText .winner{font-size:27px;font-weight:1000;line-height:1.04;word-break:break-word;text-shadow:0 0 20px rgba(192,132,252,.75)}.centerText .idle{font-size:22px;font-weight:1000;line-height:1.05}
.newEntry{animation:newEntry .45s ease-out}@keyframes newEntry{0%{transform:scale(.92);filter:brightness(1.8)}100%{transform:scale(1);filter:brightness(1)}}
.strip{margin:10px auto 0;width:370px;height:68px;border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);overflow:hidden;position:relative}
.names{position:absolute;left:0;top:0;display:flex;align-items:center;height:68px;transition:transform 5s cubic-bezier(.08,.85,.12,1)}
.nameItem{width:150px;margin:0 6px;border-radius:14px;padding:11px 10px;background:rgba(139,92,246,.28);border:1px solid rgba(255,255,255,.18);font-weight:1000;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strip:before,.strip:after{content:"";position:absolute;top:0;width:70px;height:100%;z-index:2;pointer-events:none}.strip:before{left:0;background:linear-gradient(90deg,#1b0a35,transparent)}.strip:after{right:0;background:linear-gradient(270deg,#1b0a35,transparent)}
.status{margin:10px auto 0;width:370px;text-align:center;color:#f5f3ff;font-size:15px;font-weight:1000;padding:11px 12px;border-radius:16px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15)}
@keyframes pulseWin{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}.winPulse{animation:pulseWin .7s ease-in-out infinite}
</style>
</head>
<body>
<div class="overlay" id="overlay">
  <div class="header">
    <div class="title">Giveaway Wheel</div>
    <div class="keyword" id="keyword">!join</div>
    <div class="count" id="count">0 entries</div>
  </div>
  <div class="wheelBox">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
    <div class="centerText"><div><div class="small" id="centerSmall">Type keyword to enter</div><div class="idle" id="centerMain">Waiting...</div></div></div>
  </div>
  <div class="strip"><div class="names" id="names"></div></div>
  <div class="status" id="status">Waiting for giveaway...</div>
</div>
<script>
const socket=io();let state={participants:[]};let wheelRot=0;
function fitName(n,len=18){return String(n||"Unknown").slice(0,len)}
function colorFor(i){const colors=["#7c3aed","#ffffff","#a855f7","#ede9fe","#6d28d9","#ffffff","#8b5cf6","#ddd6fe"];return colors[i%colors.length]}
function textColorFor(i){const c=colorFor(i);return c==="#ffffff"||c==="#ede9fe"||c==="#ddd6fe"?"#351465":"#ffffff"}
function drawWheel(participants){
  wheel.innerHTML="";
  const list=(participants&&participants.length)?participants:["Waiting"];
  const n=Math.min(list.length,40);
  const angle=360/n;
  for(let i=0;i<n;i++){
    const slice=document.createElement("div");
    slice.className="slice";
    slice.style.setProperty("--c",colorFor(i));
    slice.style.transform=`rotate(${i*angle}deg)`;
    slice.style.clipPath=`polygon(50% 50%, 50% 0%, ${50+50*Math.sin((angle*Math.PI)/180)}% ${50-50*Math.cos((angle*Math.PI)/180)}%, 100% 0, 100% 100%)`;
    wheel.appendChild(slice);
    const label=document.createElement("div");
    label.className="sliceLabel";
    label.style.setProperty("--tc",textColorFor(i));
    label.style.transform=`rotate(${i*angle+angle/2}deg)`;
    label.textContent=fitName(list[i],12);
    wheel.appendChild(label);
  }
}
function buildNames(list,winner){names.innerHTML="";const base=list&&list.length?list:["Waiting","For","Entries"];let full=[];for(let i=0;i<4;i++)full=full.concat(base);if(winner)full.push(winner);full.forEach(n=>{const d=document.createElement("div");d.className="nameItem";d.textContent=fitName(n);names.appendChild(d)});return full.length}
function render(s){state=s;keyword.textContent=s.keyword||"!join";if(s.hideCount){count.classList.add("hidden")}else{count.classList.remove("hidden");count.textContent=(s.count||0)+" entr"+((s.count||0)===1?"y":"ies")}drawWheel(s.participants||[]);if(!s.rolling&&s.lastWinner){centerSmall.textContent="Winner";centerMain.textContent=fitName(s.lastWinner);centerMain.className="winner winPulse";status.textContent="Winner: "+fitName(s.lastWinner)}else if(!s.rolling){centerSmall.textContent="Type keyword to enter";centerMain.textContent=(s.count||0)>0?"Ready":"Waiting...";centerMain.className="idle";status.textContent=s.connected?"Live — accepting entries":(s.lastError||"Dashboard loaded")}}
socket.on("state",render);
socket.on("entry-added",data=>{render(data.state);overlay.classList.remove("newEntry");void overlay.offsetWidth;overlay.classList.add("newEntry");status.textContent=fitName(data.username)+" entered!"});
socket.on("reset-wheel",render);
socket.on("roll-start",data=>{centerSmall.textContent="Rolling";centerMain.textContent="Good luck";centerMain.className="idle";status.textContent="Spinning for 5 seconds...";if(!data.hideCount){count.classList.remove("hidden");count.textContent=data.count+" entries"}else count.classList.add("hidden");keyword.textContent=data.keyword||"!join";drawWheel(data.participants||data.names||[]);const total=buildNames(data.names,data.winner);names.style.transition="none";names.style.transform="translateX(0px)";wheel.style.transition="none";wheel.style.transform="rotate("+wheelRot+"deg)";setTimeout(()=>{wheelRot+=1800+Math.floor(Math.random()*360);wheel.style.transition="transform 5s cubic-bezier(.08,.85,.12,1)";wheel.style.transform="rotate("+wheelRot+"deg)";names.style.transition="transform 5s cubic-bezier(.08,.85,.12,1)";const itemWidth=162;const finalOffset=Math.max(0,(total-3)*itemWidth);names.style.transform="translateX(-"+finalOffset+"px)"},40)});
socket.on("roll-finish",data=>{centerSmall.textContent="Winner";centerMain.textContent=fitName(data.winner);centerMain.className="winner winPulse";status.textContent="Winner: "+fitName(data.winner);drawWheel(data.participants||state.participants||[])});
async function poll(){try{const s=await fetch("/api/state").then(r=>r.json());render(s)}catch(e){}}poll();setInterval(poll,2500);
</script>
</body>
</html>
