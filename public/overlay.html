<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Giveaway Overlay</title><script src="/socket.io/socket.io.js"></script><style>
:root{--purple:#8b5cf6;--purple2:#c084fc;--dark:#10031d}*{box-sizing:border-box}body{margin:0;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(circle at 50% 20%,#44117c 0,#1a0630 50%,#08020e 100%);font-family:Inter,Arial,sans-serif;color:#fff}.frame{position:absolute;inset:0;padding:44px;display:grid;grid-template-rows:auto 1fr auto}.top{display:flex;align-items:center;justify-content:space-between}.title{font-size:54px;font-weight:1000;text-transform:uppercase;letter-spacing:1px;text-shadow:0 0 25px var(--purple2)}.badge{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.25);border-radius:20px;padding:18px 28px;text-align:center}.badge .label{font-size:18px;color:#dfc8ff;font-weight:900;text-transform:uppercase}.badge .num{font-size:42px;font-weight:1000}.center{display:grid;place-items:center}.wheelWrap{position:relative;width:520px;height:520px}.pointer{position:absolute;top:-8px;left:50%;transform:translateX(-50%);border-left:28px solid transparent;border-right:28px solid transparent;border-top:54px solid #fff;z-index:5;filter:drop-shadow(0 0 12px #c084fc)}.wheel{width:100%;height:100%;border-radius:50%;border:14px solid #fff;background:conic-gradient(#7c3aed 0 12.5%,#fff 12.5% 25%,#a855f7 25% 37.5%,#2e1065 37.5% 50%,#7c3aed 50% 62.5%,#fff 62.5% 75%,#a855f7 75% 87.5%,#2e1065 87.5% 100%);box-shadow:0 0 50px rgba(192,132,252,.7),inset 0 0 40px rgba(0,0,0,.55);transition:transform 5s cubic-bezier(.08,.75,.1,1);display:grid;place-items:center}.wheel:after{content:"";width:112px;height:112px;border-radius:50%;background:#130421;border:12px solid white;box-shadow:0 0 22px rgba(255,255,255,.4)}.keyword{font-size:32px;font-weight:1000;color:#fff;background:rgba(0,0,0,.34);border:2px solid rgba(255,255,255,.22);padding:18px 28px;border-radius:18px;text-align:center}.winner{font-size:78px;font-weight:1000;text-align:center;min-height:96px;text-shadow:0 0 35px var(--purple2);word-break:break-word}.status{text-align:center;font-size:26px;color:#dfc8ff;font-weight:900}.hidden{display:none}.pulse{animation:pulse 1s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
</style></head><body><div class="frame"><div class="top"><div><div class="title">Giveaway Wheel</div><div class="keyword">Type <span id="kw">!duel</span> to enter</div></div><div id="countBox" class="badge"><div class="label">Participants</div><div class="num" id="cnt">0</div></div></div><div class="center"><div class="wheelWrap"><div class="pointer"></div><div id="wheel" class="wheel"></div></div></div><div><div id="status" class="status">Waiting for entries...</div><div id="winner" class="winner">—</div></div></div><script>
const socket=io();let rotation=0;let lastRolling=false;const $=id=>document.getElementById(id);function render(s){$('kw').textContent=s.keyword||'!duel';$('cnt').textContent=s.participantCount||0;$('countBox').classList.toggle('hidden',!!s.hideCount);if(s.rolling&&!lastRolling){rotation+=1800+Math.floor(Math.random()*720);$('wheel').style.transform=`rotate(${rotation}deg)`}$('status').textContent=s.rolling?'Rolling winner...':(s.winner?'Winner':'Waiting for entries...');$('winner').textContent=s.winner||'—';$('winner').classList.toggle('pulse',!!s.winner);lastRolling=!!s.rolling}socket.on('state',render);fetch('/api/state').then(r=>r.json()).then(render);setInterval(()=>fetch('/api/state').then(r=>r.json()).then(render).catch(()=>{}),1000);
</script></body></html>
