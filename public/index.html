<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kick Keyword Wheel Giveaway</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#10051f;--panel:#1d0b36;--p:#8b5cf6;--p2:#c084fc;--w:#fff;--m:#d8ccff;--line:rgba(255,255,255,.14);--bad:#f87171;--ok:#22c55e}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(139,92,246,.35),transparent 32%),var(--bg);color:white}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.top,.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.32)}
.top{display:flex;justify-content:space-between;gap:16px;align-items:center;padding:18px 20px}.grid{display:grid;grid-template-columns:390px 1fr;gap:20px;margin-top:20px}.card{padding:20px}
h1{margin:0;font-size:28px;letter-spacing:-.03em}.small{font-size:13px;color:var(--m);line-height:1.45}.status{font-weight:1000;color:var(--ok)}.status.bad{color:var(--bad)}
label{display:block;margin:14px 0 8px;color:var(--m);font-weight:900}
input{width:100%;padding:14px 15px;border-radius:14px;background:#0d0618;border:1px solid rgba(255,255,255,.2);color:#fff;font-size:16px}
button{border:0;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:1000;color:#fff;background:linear-gradient(135deg,var(--p),#6d28d9);cursor:pointer}
button.big{width:100%;font-size:18px;padding:17px;margin-top:14px}button.secondary{background:#2d1a4d}button.danger{background:linear-gradient(135deg,#ef4444,#be123c)}
.toggle{display:flex;gap:10px;align-items:center;margin:16px 0}.toggle input{width:auto;transform:scale(1.25)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}.stat{background:#120821;border:1px solid var(--line);border-radius:16px;padding:14px}.stat .n{font-size:34px;font-weight:1000}
.participants{height:455px;overflow:auto;border-radius:18px;border:1px solid var(--line);background:#0e0717;padding:12px}.pill{display:inline-flex;background:#2b1450;border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:8px 12px;margin:5px;font-weight:900}
.err{color:#fca5a5;font-size:13px;word-break:break-word;margin-top:8px}
.row{display:flex;gap:10px}.preview{margin-top:14px;background:#0e0717;border:1px solid var(--line);border-radius:18px;padding:14px}a{color:#ddd6fe}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1>Keyword Wheel Giveaway</h1><div class="small">Viewers type your keyword in Kick chat. OBS overlay: <b>/overlay</b></div></div><div><div id="conn" class="status bad">Disconnected</div><div class="small" id="channel">@...</div></div></div>
  <div class="grid">
    <section class="card">
      <h2 style="margin-top:0">Settings</h2>
      <label>Admin PIN</label><input id="pin" type="password" placeholder="1234" />
      <label>Keyword</label><input id="keyword" placeholder="!join" />
      <div class="toggle"><input id="hideCount" type="checkbox" /><b>Hide participant count on overlay</b></div>
      <button class="big" onclick="saveSettings()">Save Settings</button>
      <button class="big secondary" onclick="roll()">Roll Winner</button>
      <button class="big danger" onclick="resetEntries()">Reset Entries</button>
      <label>Manual Test Entry</label><div class="row"><input id="manual" placeholder="username" /><button onclick="manualEntry()">Add</button></div>
      <div class="stats"><div class="stat"><div class="small">Participants</div><div class="n" id="count">0</div></div><div class="stat"><div class="small">Last Winner</div><div class="n" id="lastWinner" style="font-size:22px">—</div></div></div>
      <div id="err" class="err"></div>
    </section>
    <section class="card">
      <h2 style="margin-top:0">Participants <span id="countTitle">(0)</span></h2>
      <div id="participants" class="participants"></div>
      <div class="preview"><b>Compact OBS overlay:</b><div class="small"><a href="/overlay" target="_blank">Open /overlay</a> — suggested Browser Source size: 450×600 or 500×650.</div></div>
    </section>
  </div>
</div>
<script>
const socket=io();let state={};function pin(){return document.getElementById("pin").value||"1234"}
function render(s){state=s;conn.textContent=s.connected?"Connected":"Disconnected";conn.className="status "+(s.connected?"":"bad");channel.textContent="@"+(s.channel||"missing channel");keyword.value=s.keyword||"";hideCount.checked=!!s.hideCount;count.textContent=s.count||0;countTitle.textContent="("+(s.count||0)+")";lastWinner.textContent=s.lastWinner||"—";err.textContent=s.lastError||"";participants.innerHTML="";(s.participants||[]).forEach(n=>{const x=document.createElement("span");x.className="pill";x.textContent=n;participants.appendChild(x)})}
socket.on("state",render);
async function api(path,body){const r=await fetch(path,{method:"POST",headers:{"Content-Type":"application/json","x-admin-pin":pin()},body:JSON.stringify(body||{})});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||"Request failed");return d}
async function saveSettings(){try{await api("/api/settings",{keyword:keyword.value,hideCount:hideCount.checked})}catch(e){err.textContent=e.message}}
async function resetEntries(){try{await api("/api/reset",{})}catch(e){err.textContent=e.message}}
async function roll(){try{await api("/api/roll",{})}catch(e){err.textContent=e.message}}
async function manualEntry(){try{await api("/api/manual-entry",{username:manual.value});manual.value=""}catch(e){err.textContent=e.message}}
async function poll(){const s=await fetch("/api/state").then(r=>r.json());render(s)}poll();setInterval(poll,3000)
</script>
</body>
</html>
