<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kick Keyword Wheel Giveaway</title>
<script src="/socket.io/socket.io.js"></script>
<style>
:root{
  --bg:#11051f;
  --panel:#1b0b31;
  --panel2:#241043;
  --purple:#8b5cf6;
  --purple2:#c084fc;
  --white:#ffffff;
  --muted:#cab9e8;
  --danger:#ef4444;
  --ok:#22c55e;
  --line:rgba(255,255,255,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui,Arial,sans-serif;
  background:
    radial-gradient(circle at 20% 10%,rgba(139,92,246,.35),transparent 35%),
    radial-gradient(circle at 80% 0%,rgba(192,132,252,.18),transparent 35%),
    var(--bg);
  color:var(--white);
}
.wrap{max-width:1180px;margin:0 auto;padding:22px}
.top{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  border:1px solid var(--line);background:rgba(255,255,255,.05);
  border-radius:22px;padding:18px 20px;box-shadow:0 20px 60px rgba(0,0,0,.35)
}
h1{margin:0;font-size:28px;letter-spacing:-.03em}
.status{font-weight:800;color:var(--ok)}
.status.bad{color:var(--danger)}
.grid{display:grid;grid-template-columns:390px 1fr;gap:20px;margin-top:20px}
.card{
  border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));
  border-radius:22px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.28)
}
label{display:block;color:var(--muted);font-weight:800;margin:14px 0 8px}
input{
  width:100%;border:1px solid rgba(255,255,255,.2);background:#0f071b;color:white;
  border-radius:14px;padding:14px 15px;font-size:16px;outline:none
}
.row{display:flex;gap:10px;align-items:center}
button{
  border:0;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:900;color:white;
  background:linear-gradient(135deg,var(--purple),#6d28d9);cursor:pointer;
  box-shadow:0 10px 28px rgba(139,92,246,.28)
}
button.secondary{background:#2d1a4d;box-shadow:none}
button.danger{background:linear-gradient(135deg,#ef4444,#be123c)}
button.big{width:100%;font-size:18px;padding:17px;margin-top:14px}
.toggle{display:flex;align-items:center;gap:10px;margin:16px 0}
.toggle input{width:auto;transform:scale(1.3)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
.stat{background:#120821;border:1px solid var(--line);border-radius:16px;padding:14px}
.stat .n{font-size:34px;font-weight:1000}
.participants{
  height:455px;overflow:auto;border-radius:18px;border:1px solid var(--line);background:#0e0717;padding:12px
}
.pill{display:inline-flex;background:#241043;color:white;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 12px;margin:5px;font-weight:800}
.err{color:#fca5a5;font-size:13px;word-break:break-word;margin-top:8px}
.small{color:var(--muted);font-size:13px;line-height:1.4}
.preview{
  margin-top:14px;background:#0e0717;border:1px solid var(--line);border-radius:18px;padding:14px
}
a{color:#ddd6fe}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Keyword Wheel Giveaway</h1>
      <div class="small">Viewers type your keyword in Kick chat to enter. Use <b>/overlay</b> in OBS.</div>
    </div>
    <div>
      <div id="conn" class="status bad">Disconnected</div>
      <div class="small" id="channel">@...</div>
    </div>
  </div>

  <div class="grid">
    <section class="card">
      <h2 style="margin-top:0">Settings</h2>
      <label>Admin PIN</label>
      <input id="pin" type="password" placeholder="1234" />

      <label>Keyword</label>
      <input id="keyword" placeholder="!join" />

      <div class="toggle">
        <input id="hideCount" type="checkbox" />
        <b>Hide participant count on overlay</b>
      </div>

      <button class="big" onclick="saveSettings()">Save Settings</button>
      <button class="big secondary" onclick="roll()">Roll Winner</button>
      <button class="big danger" onclick="resetEntries()">Reset Entries</button>

      <label>Manual Test Entry</label>
      <div class="row">
        <input id="manual" placeholder="username" />
        <button onclick="manualEntry()">Add</button>
      </div>

      <div class="stats">
        <div class="stat"><div class="small">Participants</div><div class="n" id="count">0</div></div>
        <div class="stat"><div class="small">Last Winner</div><div class="n" id="lastWinner" style="font-size:22px">—</div></div>
      </div>
      <div id="err" class="err"></div>
    </section>

    <section class="card">
      <h2 style="margin-top:0">Participants <span id="countTitle">(0)</span></h2>
      <div id="participants" class="participants"></div>
      <div class="preview">
        <b>Compact OBS overlay:</b>
        <div class="small"><a href="/overlay" target="_blank">Open /overlay</a> — recommended Browser Source size: 450×600 or 500×650</div>
      </div>
    </section>
  </div>
</div>

<script>
const socket = io();
let state = {};

function pin(){ return document.getElementById("pin").value || "1234"; }

function render(s){
  state=s;
  conn.textContent = s.connected ? "Connected" : "Disconnected";
  conn.className = "status " + (s.connected ? "" : "bad");
  channel.textContent = "@" + (s.channel || "missing channel");
  keyword.value = s.keyword || "";
  hideCount.checked = !!s.hideCount;
  count.textContent = s.count || 0;
  countTitle.textContent = "(" + (s.count || 0) + ")";
  lastWinner.textContent = s.lastWinner || "—";
  err.textContent = s.lastError || "";
  participants.innerHTML = "";
  (s.participants || []).forEach(name => {
    const span=document.createElement("span");
    span.className="pill";
    span.textContent=name;
    participants.appendChild(span);
  });
}

socket.on("state", render);

async function api(path, body){
  const res = await fetch(path, {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-admin-pin": pin() },
    body: JSON.stringify(body || {})
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

async function saveSettings(){
  try{
    await api("/api/settings", { keyword: keyword.value, hideCount: hideCount.checked });
  }catch(e){ err.textContent=e.message; }
}

async function resetEntries(){
  try{ await api("/api/reset", {}); }
  catch(e){ err.textContent=e.message; }
}

async function roll(){
  try{ await api("/api/roll", {}); }
  catch(e){ err.textContent=e.message; }
}

async function manualEntry(){
  try{ await api("/api/manual-entry", { username: manual.value }); manual.value=""; }
  catch(e){ err.textContent=e.message; }
}

async function poll(){
  const s = await fetch("/api/state").then(r=>r.json());
  render(s);
}
poll();
setInterval(poll, 3000);
</script>
</body>
</html>
