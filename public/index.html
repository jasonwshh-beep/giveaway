<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kick Keyword Wheel Giveaway</title><script src="/socket.io/socket.io.js"></script><style>
:root{--bg:#12051f;--panel:#1f0b35;--panel2:#2b1047;--purple:#8b5cf6;--purple2:#c084fc;--white:#fff;--muted:#d6c7eb;--line:rgba(255,255,255,.18);--green:#35ff86;--red:#ff3666}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#32105c 0,#12051f 55%,#09030f 100%);color:var(--white);font-family:Inter,Arial,Helvetica,sans-serif;min-height:100vh}.wrap{max-width:1180px;margin:0 auto;padding:22px}.top{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:18px}.brand{font-size:30px;font-weight:900;letter-spacing:.5px}.brand span{color:var(--purple2)}.status{font-weight:800}.ok{color:var(--green)}.bad{color:var(--red)}.grid{display:grid;grid-template-columns:380px 1fr;gap:22px}.card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;box-shadow:0 18px 45px rgba(0,0,0,.35);padding:22px}.card h2{margin:0 0 18px;font-size:24px}.field{margin-bottom:16px}label{display:block;color:var(--muted);font-weight:700;margin-bottom:8px}input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.24);background:#11081d;color:white;font-size:18px;outline:none}input:focus{border-color:var(--purple2);box-shadow:0 0 0 3px rgba(192,132,252,.16)}.row{display:flex;gap:12px}.row>*{flex:1}.check{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-weight:800}.toggle{width:52px;height:28px;border-radius:99px;background:#3d2b51;position:relative;cursor:pointer;border:1px solid var(--line)}.toggle:before{content:"";position:absolute;width:22px;height:22px;top:2px;left:3px;background:#fff;border-radius:50%;transition:.18s}.toggle.on{background:var(--purple)}.toggle.on:before{left:25px}.btn{border:0;border-radius:14px;padding:15px 18px;color:white;font-weight:900;font-size:16px;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#c026d3);box-shadow:0 10px 24px rgba(124,58,237,.3)}.btn:hover{filter:brightness(1.08)}.btn.secondary{background:#2f243f;border:1px solid var(--line);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#be123c,#f43f5e)}.btn:disabled{opacity:.45;cursor:not-allowed}.hint{font-size:13px;color:#c9b7df;line-height:1.45}.participantsHead{display:flex;justify-content:space-between;align-items:end;margin-bottom:14px}.bigCount{font-size:42px;font-weight:1000;color:var(--purple2)}.list{height:420px;overflow:auto;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;align-content:flex-start;align-items:flex-start;gap:8px;flex-wrap:wrap}.chip{padding:9px 12px;border-radius:999px;background:rgba(139,92,246,.18);border:1px solid rgba(192,132,252,.32);font-weight:800}.wheelArea{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:center}.wheelWrap{position:relative;width:340px;height:340px;margin:auto}.pointer{position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:30px solid #fff;z-index:4;filter:drop-shadow(0 0 10px #c084fc)}.wheel{width:100%;height:100%;border-radius:50%;border:10px solid white;background:conic-gradient(#7c3aed 0 25%,#fff 25% 50%,#a855f7 50% 75%,#2e1065 75% 100%);box-shadow:0 0 35px rgba(192,132,252,.55),inset 0 0 30px rgba(0,0,0,.55);display:grid;place-items:center;transition:transform 5s cubic-bezier(.08,.75,.1,1)}.wheel:after{content:"";width:70px;height:70px;border-radius:50%;background:#150522;border:8px solid #fff;box-shadow:0 0 16px rgba(0,0,0,.5)}.winnerBox{padding:18px;border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.06);min-height:170px}.winnerLabel{color:var(--muted);font-weight:900}.winnerName{font-size:42px;font-weight:1000;color:#fff;text-shadow:0 0 18px var(--purple2);word-break:break-word}.error{color:#ff8aa5;font-weight:800;margin-top:8px}.small{font-size:13px;color:#d6c7eb}.recent{margin-top:14px;color:#cbb6e3;font-size:13px;max-height:80px;overflow:auto}@media(max-width:900px){.grid,.wheelArea{grid-template-columns:1fr}.card{padding:16px}.wrap{padding:12px}.wheelWrap{width:280px;height:280px}}
</style></head><body><div class="wrap"><div class="top"><div class="brand">Kick <span>Giveaway Wheel</span></div><div class="status" id="conn">Connecting...</div></div><div class="grid"><section class="card"><h2>Settings</h2><div class="field"><label>Admin PIN</label><input id="pin" type="password" placeholder="1234"></div><div class="field"><label>Keyword</label><input id="keyword" placeholder="!duel"></div><div class="check"><div id="hideToggle" class="toggle"></div><span>Hide participant count on overlay</span></div><button class="btn" id="startBtn">Start Giveaway</button><div class="row" style="margin-top:12px"><button class="btn secondary" id="testBtn">Add Test Entry</button><button class="btn danger" id="resetBtn">Reset</button></div><p class="hint">Viewers enter by typing the exact keyword in Kick chat. One entry per username. Use the overlay URL in OBS: <b>/overlay</b></p><div id="err" class="error"></div><div class="recent" id="recent"></div></section><section class="card"><div class="participantsHead"><h2>Participants <span id="count">0</span></h2><button class="btn" id="rollBtn">Roll Winner</button></div><div class="wheelArea"><div class="wheelWrap"><div class="pointer"></div><div id="wheel" class="wheel"></div></div><div class="winnerBox"><div class="winnerLabel" id="rollStatus">Waiting to roll...</div><div class="winnerName" id="winner">—</div><div class="small" id="subtext">The wheel spins for 5 seconds and lands on the winner.</div></div></div><div class="list" id="list"></div></section></div></div><script>
const socket=io();let st=null;let rotation=0;let hideCount=false;const $=id=>document.getElementById(id);$('pin').value=localStorage.pin||'';function pin(){localStorage.pin=$('pin').value;return $('pin').value}function render(s){st=s;$('conn').innerHTML=(s.connected?`Connected to: <span class="ok">${s.channel}</span>`:`Disconnected from: <span class="bad">${s.channel}</span>`);$('keyword').value=s.keyword||'';hideCount=!!s.hideCount;$('hideToggle').classList.toggle('on',hideCount);$('count').textContent=s.hideCount?'Hidden':s.participantCount;$('list').innerHTML=s.participants.map(x=>`<div class="chip">${escapeHtml(x)}</div>`).join('');$('err').textContent=s.lastError||'';$('recent').innerHTML=(s.recentMessages||[]).map(x=>escapeHtml(x)).join('<br>');$('winner').textContent=s.winner||'—';$('rollStatus').textContent=s.rolling?'Rolling...':(s.winner?'Winner Selected':'Waiting to roll...');$('rollBtn').disabled=s.rolling||s.participantCount<1;if(s.rolling){$('subtext').textContent='Wheel spinning for 5 seconds...';}else if(s.winner){$('subtext').textContent='Winner locked. Tip them or reroll/reset.';}else{$('subtext').textContent='The wheel spins for 5 seconds and lands on the winner.';}}function escapeHtml(x){return String(x).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}socket.on('state',render);async function post(url,body={}){const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json','x-admin-pin':pin()},body:JSON.stringify(body)});if(!r.ok){const t=await r.text();throw new Error(t)}return r.json()}$('hideToggle').onclick=()=>{hideCount=!hideCount;$('hideToggle').classList.toggle('on',hideCount);post('/api/settings',{keyword:$('keyword').value,hideCount}).catch(e=>alert(e.message))};$('startBtn').onclick=()=>post('/api/start',{keyword:$('keyword').value,hideCount}).catch(e=>alert(e.message));$('resetBtn').onclick=()=>{if(confirm('Reset giveaway?'))post('/api/reset').catch(e=>alert(e.message))};$('testBtn').onclick=()=>post('/api/test-entry',{username:'TestUser'+Math.floor(Math.random()*9999)}).catch(e=>alert(e.message));$('rollBtn').onclick=async()=>{try{rotation+=1800+Math.floor(Math.random()*720);$('wheel').style.transform=`rotate(${rotation}deg)`;await post('/api/roll')}catch(e){alert(e.message)}};fetch('/api/state').then(r=>r.json()).then(render);
</script></body></html>
